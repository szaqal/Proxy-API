name: Maven Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Run Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: .
        framework: dockerfile,github_actions
        soft_fail: false
        output_format: cli

  owasp:
    runs-on: ubuntu-latest
    needs: checkov
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Cache OWASP NVD database
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: owasp-nvd-${{ runner.os }}-
    - name: Run OWASP Dependency Check
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: mvn -f java/proxy-api/pom.xml -B dependency-check:check
    - name: Upload OWASP report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: owasp-report
        path: java/proxy-api/target/dependency-check-report.*

  build:
    runs-on: ubuntu-latest
    needs: checkov
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build
      run: mvn -f java/proxy-api/pom.xml -B install

  publish:
    runs-on: ubuntu-latest
    needs: [build,owasp] #[build, owasp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build JAR
      run: mvn -f java/proxy-api/pom.xml -B install -DskipTests
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        TAG_NAME=0.0.1-${SHORT_SHA}
        docker build -f java/Dockerfile.publish -t szaqal/proxy-api:latest -t szaqal/proxy-api:${TAG_NAME} java/
        docker push szaqal/proxy-api:latest
        docker push szaqal/proxy-api:${TAG_NAME}
